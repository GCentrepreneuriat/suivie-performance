<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'">
<title>Performance - Guillaume Gosselin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#F4F5F7;color:#222;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input[type=number]{-moz-appearance:textfield;font-family:inherit}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
#header{background:#fff;border-bottom:2px solid #EEE;padding:14px 20px;position:sticky;top:0;z-index:99}
.hi{max-width:960px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.heyebrow{font-size:10px;letter-spacing:.2em;color:#B8860B;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.htitle{font-size:20px;font-weight:700;margin-bottom:2px}
.hdate{font-size:11px;color:#AAA}
.scores{display:flex;gap:16px;align-items:center}
.sdiv{width:1px;height:30px;background:#EEE}
.sp{font-size:9px;color:#BBB;text-transform:uppercase;letter-spacing:.1em;text-align:center;margin-bottom:3px}
#tabbar{background:#fff;border-bottom:2px solid #EEE}
.ti{max-width:960px;margin:0 auto;display:flex;padding:0 20px}
.tb{background:none;border:none;padding:11px 18px;font-size:13px;color:#AAA;border-bottom:3px solid transparent;font-weight:400}
.tb.on{color:#B8860B;border-bottom-color:#B8860B;font-weight:700}
#content{max-width:960px;margin:0 auto;padding:20px 20px 60px}
.srow{display:flex;gap:8px;margin-bottom:18px}
.sb{border:none;padding:7px 16px;font-size:12px;border-radius:20px;font-weight:600}
.sb.on{background:#222;color:#fff}
.sb:not(.on){background:#EEE;color:#888}
.card{background:#fff;border:1px solid #E8E8E8;border-radius:12px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:14px}
.g5{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.fr{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.cc{border-radius:12px;overflow:hidden;border-width:2px;border-style:solid}
.ch{padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.ct{font-size:14px;font-weight:700}
.cbadge{font-size:11px;background:#fff;border-radius:20px;padding:3px 10px;border-width:1px;border-style:solid}
.cb{background:#fff;padding:13px 16px;display:flex;flex-direction:column;gap:12px}
.ml{font-size:12px;color:#555;margin-bottom:4px}
.mr2{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.wi{display:flex;justify-content:space-between;font-size:10px;color:#BBB;flex:1;margin-right:10px}
.ctr{display:flex;align-items:center;gap:7px}
.cv{font-size:20px;font-weight:700;min-width:26px;text-align:center}
.bm{width:28px;height:28px;border-radius:6px;border:1.5px solid #DDD;background:#FAFAFA;color:#BBB;font-size:20px;line-height:1;display:flex;align-items:center;justify-content:center}
.bp{width:28px;height:28px;border-radius:6px;font-size:20px;line-height:1;font-weight:700;display:flex;align-items:center;justify-content:center;border-width:1.5px;border-style:solid}
.bw{height:5px;background:#EEE;border-radius:3px;overflow:hidden;margin-top:3px}
.bf{height:100%;border-radius:3px}
.slbl{font-size:10px;color:#BBB;letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px}
.banner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px;padding:16px 18px}
.sbox{border-radius:10px;padding:12px 14px;flex:1;min-width:90px;border-width:1px;border-style:solid}
.slb{font-size:10px;color:#888;margin-bottom:4px}
.sv{font-size:20px;font-weight:700;line-height:1}
.ss{font-size:10px;color:#BBB;margin-top:3px}
.mi{width:100%;padding:8px 12px;border:1.5px solid #DDD;border-radius:8px;font-size:14px;background:#FAFAFA;outline:none;color:#222}
.ebar{background:#F0FAF7;border:1px solid #A8DDD0;border-radius:10px;padding:11px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.dr{background:#fff;border:1px solid #EEE;border-radius:8px;padding:10px 14px;margin-bottom:6px}
.dr.td{border-color:rgba(184,134,11,.4)}
.dt{display:flex;justify-content:space-between;align-items:center}
.dn{font-size:13px}
.dp{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.pill{font-size:10px;border-radius:20px;padding:2px 8px;border-width:1px;border-style:solid}
.wb{background:#fff;border:1px solid #EEE;border-radius:8px;padding:12px 18px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.wb.cur{border-color:rgba(184,134,11,.4);background:#FFFDF5}
.ebtn{background:#B8860B;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700}
.fc{border-radius:12px;overflow:hidden;border-width:2px;border-style:solid}
.fh{padding:11px 16px}
.fb{background:#fff;padding:13px 16px;display:flex;flex-direction:column;gap:12px}
.fl{font-size:11px;color:#888;display:block;margin-bottom:5px}
.pi{display:flex;gap:14px;flex-wrap:wrap;margin-top:5px}
.pit{font-size:11px;color:#888}
.empty{text-align:center;color:#CCC;font-style:italic;padding:18px;background:#fff;border-radius:12px}
</style>
</head>
<body>
<div id="header">
  <div class="hi">
    <div>
      <div class="heyebrow">Guillaume Gosselin - iA Groupe Financier</div>
      <div class="htitle">Tableau de bord - Performance</div>
      <div class="hdate" id="hdate">Chargement...</div>
    </div>
    <div class="scores">
      <div><div class="sp">Semaine</div><div id="sw">-</div></div>
      <div class="sdiv"></div>
      <div><div class="sp">Mois</div><div id="sm">-</div></div>
    </div>
  </div>
</div>
<div id="tabbar">
  <div class="ti">
    <button class="tb on" id="tb0" onclick="setV('today')">Aujourd'hui</button>
    <button class="tb" id="tb1" onclick="setV('week')">Semaine</button>
    <button class="tb" id="tb2" onclick="setV('month')">Mois</button>
  </div>
</div>
<div id="content">
  <div class="srow">
    <button class="sb on" id="sb0" onclick="setS('activite')">Activite</button>
    <button class="sb" id="sb1" onclick="setS('finances')">Finances et ROI</button>
  </div>
  <div id="app">Chargement...</div>
</div>

<script type="text/javascript">
// Dashboard Guillaume Gosselin

var CATS = [
  {id:'vie',label:'Leads Vie',color:'#B8860B',light:'#FFF8ED',border:'#F0D080'},
  {id:'entrepreneur',label:'Entrepreneur',color:'#2A7A6A',light:'#F0FAF7',border:'#A8DDD0'},
  {id:'autres',label:'Autres Leads',color:'#6A4AB8',light:'#F7F4FF',border:'#C8B8F0'}
];
var MET = [
  {id:'appels',label:'Appels composes',wt:60},
  {id:'parles',label:'Personnes parlees',wt:20},
  {id:'rdv_book',label:'RDV bookes',wt:12},
  {id:'rdv_real',label:'RDV realises',wt:8},
  {id:'ventes',label:'Ventes conclues',wt:2}
];
var ET = 10;
var SK = 'gg_perf_v3';
var D = {};
try { var raw = localStorage.getItem(SK); if (raw) D = JSON.parse(raw); } catch(e) { D = {}; }
var V = 'today';
var S = 'activite';

function save() { try { localStorage.setItem(SK, JSON.stringify(D)); } catch(e) {} }

function pad(n) { return n < 10 ? '0'+n : ''+n; }
function tKey() {
  var n = new Date();
  return n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate());
}
function wkS(ds) {
  var d = new Date(ds+'T12:00:00');
  var day = d.getDay(); if (!day) day = 7;
  d.setDate(d.getDate()-day+1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function moS(ds) { return ds.slice(0,7); }
function fLong(ds) {
  try { return new Date(ds+'T12:00:00').toLocaleDateString('fr-CA',{weekday:'long',month:'long',day:'numeric'}); }
  catch(e) { return ds; }
}
function fShort(ds) {
  try { return new Date(ds+'T12:00:00').toLocaleDateString('fr-CA',{weekday:'short',month:'short',day:'numeric'}); }
  catch(e) { return ds; }
}
function fWR(wk) {
  try {
    var d = new Date(wk+'T12:00:00'), e = new Date(d); e.setDate(e.getDate()+4);
    return d.toLocaleDateString('fr-CA',{month:'short',day:'numeric'})+' - '+e.toLocaleDateString('fr-CA',{month:'short',day:'numeric'});
  } catch(e) { return wk; }
}
function fMo(mk) {
  try { var p = mk.split('-'); return new Date(+p[0],+p[1]-1,1).toLocaleDateString('fr-CA',{month:'long',year:'numeric'}); }
  catch(e) { return mk; }
}
function fMoney(n) {
  n = parseFloat(n) || 0;
  try { return n.toLocaleString('fr-CA',{minimumFractionDigits:0,maximumFractionDigits:0})+' $'; }
  catch(e) { return Math.round(n)+' $'; }
}

var TODAY = tKey();

function allD() { var k = Object.keys(D); k.sort(); return k; }
function wkD() { var ws = wkS(TODAY); return allD().filter(function(d){ return wkS(d)===ws; }); }
function moD() { var ms = moS(TODAY); return allD().filter(function(d){ return moS(d)===ms; }); }
function gv(cid,mid) { try { return D[TODAY][cid][mid]||0; } catch(e) { return 0; } }
function wkBC(cid,mid) { var wd=wkD(),s=0; for(var i=0;i<wd.length;i++) { try { s+=D[wd[i]][cid][mid]||0; } catch(e) {} } return s; }
function finV(cid,f) { try { return D[TODAY].fin[cid][f]||0; } catch(e) { return 0; } }

function sC(s) { return s>=100?'#1A8A3A':s>=70?'#B8860B':s>=50?'#C84A2A':'#AAA'; }
function sL(s) { return s>=120?'Exceptionnel!':s>=100?'Objectif depasse':s>=70?'Solide':s>=50?'A ameliorer':'Insuffisant'; }

function calcS(days) {
  if (!days||!days.length) return 0;
  var score = 0;
  for (var i=0;i<MET.length;i++) {
    var total = 0;
    for (var j=0;j<days.length;j++) for (var k=0;k<CATS.length;k++) { try { total+=D[days[j]][CATS[k].id][MET[i].id]||0; } catch(e) {} }
    score += total/MET[i].wt;
  }
  return Math.round((score/MET.length)*100);
}
function calcMS(md) {
  var wm={},keys; for(var i=0;i<md.length;i++){var wk=wkS(md[i]);if(!wm[wk])wm[wk]=[];wm[wk].push(md[i]);}
  keys=Object.keys(wm); if(!keys.length) return 0;
  var sum=0; for(var j=0;j<keys.length;j++) sum+=calcS(wm[keys[j]]);
  return Math.round(sum/keys.length);
}

function upM(cid,mid,delta) {
  if(!D[TODAY])D[TODAY]={};
  if(!D[TODAY][cid])D[TODAY][cid]={};
  D[TODAY][cid][mid]=Math.max(0,(D[TODAY][cid][mid]||0)+delta);
  save();render();
}
function upF(cid,field,val) {
  if(!D[TODAY])D[TODAY]={};
  if(!D[TODAY].fin)D[TODAY].fin={};
  if(!D[TODAY].fin[cid])D[TODAY].fin[cid]={};
  D[TODAY].fin[cid][field]=parseFloat(val)||0;
  save();
}
function upFL(cid,delta) {
  if(!D[TODAY])D[TODAY]={};
  if(!D[TODAY].fin)D[TODAY].fin={};
  if(!D[TODAY].fin[cid])D[TODAY].fin[cid]={};
  D[TODAY].fin[cid].leads=Math.max(0,(D[TODAY].fin[cid].leads||0)+delta);
  save();
  var el=document.getElementById('fl-'+cid);
  if(el) el.textContent=D[TODAY].fin[cid].leads;
}

function setV(v){V=v;render();}
function setS(s){S=s;render();}

function sb(score,lg) {
  var c=sC(score),fs=lg?'36px':'20px',lfs=lg?'11px':'9px',bw=lg?'80px':'50px';
  return '<div style="display:flex;align-items:center;gap:'+(lg?11:6)+'px">'
    +'<div style="font-size:'+fs+';color:'+c+';font-weight:700;line-height:1">'+score+'%</div>'
    +'<div><div style="font-size:'+lfs+';color:'+c+';font-style:italic">'+sL(score)+'</div>'
    +'<div style="height:4px;width:'+bw+';background:#EEE;border-radius:2px;margin-top:3px;overflow:hidden">'
    +'<div style="height:100%;width:'+Math.min(score,100)+'%;background:'+c+';border-radius:2px"></div>'
    +'</div></div></div>';
}
function bar(pct,color) {
  var p=Math.min(pct,100),bg=p>=100?'#1A8A3A':color;
  return '<div class="bw"><div class="bf" style="width:'+p+'%;background:'+bg+'"></div></div>';
}
function sbox(lbl,val,sub,color,bg,brd) {
  color=color||'#222';bg=bg||'#F8F8F8';brd=brd||'#EEE';
  return '<div class="sbox" style="background:'+bg+';border-color:'+brd+'">'
    +'<div class="slb">'+lbl+'</div>'
    +'<div class="sv" style="color:'+color+'">'+val+'</div>'
    +(sub?'<div class="ss">'+sub+'</div>':'')+'</div>';
}

function rTA() {
  var wd=wkD(),ea=wkBC('entrepreneur','appels'),html='<div class="g3">';
  for(var ci=0;ci<CATS.length;ci++){
    var cat=CATS[ci],dt=0;
    for(var mi=0;mi<MET.length;mi++) dt+=gv(cat.id,MET[mi].id);
    html+='<div class="cc" style="border-color:'+cat.border+'">';
    html+='<div class="ch" style="background:'+cat.light+'">';
    html+='<div class="ct" style="color:'+cat.color+'">'+cat.label+'</div>';
    html+='<div class="cbadge" style="color:'+cat.color+';border-color:'+cat.border+'">'+dt+" aujourd'hui</div></div>";
    html+='<div class="cb">';
    for(var mi2=0;mi2<MET.length;mi2++){
      var m=MET[mi2],dv=gv(cat.id,m.id),wv=wkBC(cat.id,m.id);
      var pct=Math.round((wv/m.wt)*100),wc=wv>=m.wt?'#1A8A3A':cat.color;
      html+='<div><div class="ml">'+m.label+'</div>';
      html+='<div class="mr2">';
      html+='<div class="wi"><span style="color:#BBB">Sem: <strong style="color:'+wc+'">'+wv+'</strong>/'+m.wt+'</span>';
      html+='<span style="color:'+(pct>=100?'#1A8A3A':'#CCC')+'">'+(pct>=100?'OK ':'')+pct+'%</span></div>';
      html+='<div class="ctr">';
      html+='<button class="bm" onclick="upM(\''+cat.id+'\',\''+m.id+'\',-1)">-</button>';
      html+='<span class="cv">'+dv+'</span>';
      html+='<button class="bp" style="border-color:'+cat.border+';background:'+cat.light+';color:'+cat.color+'" onclick="upM(\''+cat.id+'\',\''+m.id+'\',1)">+</button>';
      html+='</div></div>'+bar(pct,cat.color)+'</div>';
    }
    html+='</div></div>';
  }
  html+='</div>';
  html+='<div class="card" style="padding:13px 16px;margin-bottom:12px">';
  html+='<div class="slbl">Total combine aujourd\'hui</div>';
  html+='<div style="display:flex;gap:18px;flex-wrap:wrap">';
  for(var mi3=0;mi3<MET.length;mi3++){
    var m2=MET[mi3],tot=0;
    for(var ci2=0;ci2<CATS.length;ci2++) tot+=gv(CATS[ci2].id,m2.id);
    html+='<div style="text-align:center"><div style="font-size:10px;color:#BBB;margin-bottom:2px">'+m2.label+'</div>';
    html+='<div style="font-size:26px;font-weight:700">'+tot+'</div></div>';
  }
  html+='</div></div>';
  html+='<div class="ebar">';
  html+='<span style="font-size:12px;color:#2A7A6A;font-weight:600">Entrepreneur - Objectif appels semaine</span>';
  html+='<div style="display:flex;align-items:center;gap:10px">';
  html+='<span style="font-size:18px;font-weight:700;color:'+(ea>=ET?'#1A8A3A':'#2A7A6A')+'">'+ea+' / '+ET+'</span>';
  html+='<div style="width:80px">'+bar((ea/ET)*100,'#2A7A6A')+'</div></div></div>';
  var ws=calcS(wd);
  html+='<div class="card" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">';
  html+='<span style="font-size:12px;color:#BBB;font-style:italic">Objectifs hebdomadaires - repartis librement.</span>';
  html+=sb(ws,false)+'</div>';
  return html;
}

function rTF() {
  var pubs=[{id:'vie',label:'Leads Vie',color:'#B8860B',light:'#FFF8ED',border:'#F0D080'},{id:'entrepreneur',label:'Entrepreneur',color:'#2A7A6A',light:'#F0FAF7',border:'#A8DDD0'}];
  var html='<div class="g3" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))">';
  for(var i=0;i<pubs.length;i++){
    var c=pubs[i],leads=finV(c.id,'leads'),budget=finV(c.id,'budget'),comm=finV(c.id,'commissions');
    html+='<div class="fc" style="border-color:'+c.border+'">';
    html+='<div class="fh" style="background:'+c.light+'"><strong style="font-size:13px;color:'+c.color+'">'+c.label+'</strong></div>';
    html+='<div class="fb">';
    html+='<div><label class="fl">Leads recus</label>';
    html+='<div class="ctr"><button class="bm" onclick="upFL(\''+c.id+'\',-1)">-</button>';
    html+='<span class="cv" id="fl-'+c.id+'">'+leads+'</span>';
    html+='<button class="bp" style="border-color:'+c.border+';background:'+c.light+';color:'+c.color+'" onclick="upFL(\''+c.id+'\',1)">+</button></div></div>';
    html+='<div><label class="fl">Budget pub depense ($)</label>';
    html+='<input class="mi" type="number" min="0" value="'+(budget||'')+'" placeholder="0" onchange="upF(\''+c.id+'\',\'budget\',this.value)"></div>';
    html+='<div><label class="fl">Commissions encaissees ($)</label>';
    html+='<input class="mi" type="number" min="0" value="'+(comm||'')+'" placeholder="0" onchange="upF(\''+c.id+'\',\'commissions\',this.value)"></div>';
    html+='</div></div>';
  }
  var ac=finV('autres','commissions');
  html+='<div class="fc" style="border-color:#C8B8F0">';
  html+='<div class="fh" style="background:#F7F4FF"><strong style="font-size:13px;color:#6A4AB8">Autres - Hors pub</strong></div>';
  html+='<div class="fb"><div><label class="fl">Commissions - references, reseau ($)</label>';
  html+='<input class="mi" type="number" min="0" value="'+(ac||'')+'" placeholder="0" onchange="upF(\'autres\',\'commissions\',this.value)"></div></div></div>';
  html+='</div>';
  return html;
}

function rWA() {
  var wd=wkD(),ws=calcS(wd),ea=wkBC('entrepreneur','appels');
  var html='<div class="card banner"><div>';
  html+='<div style="font-size:10px;color:#BBB;letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px">Score de la semaine</div>';
  html+='<div style="font-size:13px;color:#777">Semaine du '+fWR(wkS(TODAY))+'</div></div>';
  html+=sb(ws,true)+'</div>';
  html+='<div class="slbl">Objectifs combines</div><div class="g5">';
  for(var mi=0;mi<MET.length;mi++){
    var m=MET[mi],total=0;
    for(var ci=0;ci<CATS.length;ci++) total+=wkBC(CATS[ci].id,m.id);
    var pct=Math.round((total/m.wt)*100),c2=sC(pct);
    html+='<div class="card" style="padding:12px 13px">';
    html+='<div style="font-size:11px;color:#999;margin-bottom:6px">'+m.label+'</div>';
    html+='<div style="font-size:26px;font-weight:700;line-height:1">'+total+'</div>';
    html+='<div style="font-size:11px;color:#CCC;margin-bottom:2px">obj. '+m.wt+'</div>';
    html+=bar(pct,'#B8860B');
    html+='<div style="font-size:11px;color:'+c2+';font-weight:700;margin-top:3px">'+(pct>=100?'OK ':'')+pct+'%</div>';
    html+='<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">';
    for(var ci2=0;ci2<CATS.length;ci2++){var v=wkBC(CATS[ci2].id,m.id);if(v)html+='<span class="pill" style="color:'+CATS[ci2].color+';background:'+CATS[ci2].light+';border-color:'+CATS[ci2].border+'">'+v+'</span>';}
    html+='</div></div>';
  }
  html+='</div>';
  html+='<div class="ebar">';
  html+='<span style="font-size:12px;color:#2A7A6A;font-weight:600">Entrepreneur - Objectif appels semaine</span>';
  html+='<div style="display:flex;align-items:center;gap:10px"><span style="font-size:18px;font-weight:700;color:'+(ea>=ET?'#1A8A3A':'#2A7A6A')+'">'+ea+' / '+ET+'</span>';
  html+='<div style="width:80px">'+bar((ea/ET)*100,'#2A7A6A')+'</div></div></div>';
  html+='<div class="slbl">Journal de la semaine</div>';
  if(!wd.length) return html+'<div class="empty">Aucune donnee cette semaine encore.</div>';
  for(var di=0;di<wd.length;di++){
    var d=wd[di],dm={},grand=0;

}

function rWF() {
  var wd=wkD();

  for(var i=0;i<wd.length;i++){

    ['vie','entrepreneur'].forEach(function(cid){try{agg[cid].leads+=f[cid].leads||0;agg[cid].budget+=f[cid].budget||0;agg[cid].commissions+=f[cid].commissions||0;}catch(e){}});
    try{agg.autres.commissions+=f.autres.commissions||0;}catch(e){}

  var html='<div class="fr">'+sbox('Budget pub',fMoney(tb))+sbox('Revenus',fMoney(tr),'',tr>0?'#1A8A3A':'#222')+sbox('Profit net',(prof>=0?'+':'')+fMoney(prof),'',prof>=0?'#1A8A3A':'#C84A2A',prof>=0?'#F0FAF5':'#FFF5F5',prof>=0?'#A8DDD0':'#F0C0C0')+(roi!==null?sbox('ROI pub',roi+'%','profit/budget',roi>=0?'#1A8A3A':'#C84A2A'):'')+'</div>';
  html+='<div class="fr">'+sbox('Leads totaux',tl,'Vie + Entrepreneur')+(cpl?sbox('Cout/lead',fMoney(cpl)):'')+sbox('Ventes',tv)+(cpv?sbox('Cout/vente',fMoney(cpv)):'')+( rpv?sbox('Rev./vente',fMoney(rpv)):'')+'</div>';
  html+='<div class="g2">';
  [{id:'vie',label:'Leads Vie',color:'#B8860B',light:'#FFF8ED',border:'#F0D080'},{id:'entrepreneur',label:'Entrepreneur',color:'#2A7A6A',light:'#F0FAF7',border:'#A8DDD0'}].forEach(function(c){
    var a=agg[c.id],cp=a.leads>0?Math.round(a.budget/a.leads):null;

    if(cp!==null) html+='<div style="display:flex;justify-content:space-between;font-size:12px"><span style="color:#888">Cout/lead</span><strong>'+fMoney(cp)+'</strong></div>';
    html+='</div>';
  });
  html+='</div>';
  html+='<div class="slbl">Detail par jour</div>';
  for(var di=0;di<wd.length;di++){
    var d=wd[di],f2={};try{f2=D[d].fin||{};}catch(e){}
    var db=0,dr=0,dl=0;try{db=(f2.vie.budget||0)+(f2.entrepreneur.budget||0);}catch(e){}try{dr=(f2.vie.commissions||0)+(f2.entrepreneur.commissions||0)+(f2.autres.commissions||0);}catch(e){}try{dl=(f2.vie.leads||0)+(f2.entrepreneur.leads||0);}catch(e){}
    var dp=dr-db;

function rMA() {

  html+='<div style="display:flex;align-items:center;gap:13px">'+sb(ms,true)+'<button class="ebtn" onclick="exportPDF()">Exporter PDF</button></div></div>';
  html+='<div class="slbl">Totaux du mois</div><div class="g5">';

function rMF() {

  var prof=fin.commissions-fin.budget,roi=fin.budget>0?Math.round((prof/fin.budget)*100):null;

  var cpl=fin.leads>0?Math.round(fin.budget/fin.leads):null,cpv=tv>0?Math.round(fin.budget/tv):null,rpv=tv>0?Math.round(fin.commissions/tv):null;

function render() {
  try {
    var wd=wkD(),md=moD(),ws=calcS(wd),ms=calcMS(md);
    var hd=document.getElementById('hdate');if(hd)hd.textContent=fLong(TODAY);
    var sw=document.getElementById('sw');if(sw)sw.innerHTML=sb(ws,false);
    var sm=document.getElementById('sm');if(sm)sm.innerHTML=sb(ms,false);
    var t0=document.getElementById('tb0');if(t0)t0.className='tb'+(V==='today'?' on':'');
    var t1=document.getElementById('tb1');if(t1)t1.className='tb'+(V==='week'?' on':'');
    var t2=document.getElementById('tb2');if(t2)t2.className='tb'+(V==='month'?' on':'');
    var s0=document.getElementById('sb0');if(s0)s0.className='sb'+(S==='activite'?' on':'');
    var s1=document.getElementById('sb1');if(s1)s1.className='sb'+(S==='finances'?' on':'');
    var html='';
    if(V==='today'&&S==='activite') html=rTA();
    else if(V==='today'&&S==='finances') html=rTF();
    else if(V==='week'&&S==='activite') html=rWA();

}
